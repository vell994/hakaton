<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор Сертификатов | Два шаблона</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <h1>📜 Генератор Сертификатов · Два шаблона</h1>
    
    <div class="main-container">
        <div class="table-section">
            <h2>📊 Данные сертификатов</h2>
            <div class="table-header">
                <div class="table-controls">
                    <label class="sec-btn">
                        📂 Загрузить Excel
                        <input type="file" id="excelFile" class="hidden-input" accept=".xlsx,.xls">
                    </label>
                    <button class="info-btn" onclick="addColumn()">➕ Колонка</button>
                    <button class="danger-btn" onclick="resetTable()">↺ Сброс</button>
                </div>
                <div class="pagination">
                    <button class="page-btn" id="prevBtn" onclick="changePage(-1)">◀ Назад</button>
                    <span class="page-info" id="pageInfo">0 / 0</span>
                    <button class="page-btn" id="nextBtn" onclick="changePage(1)">Вперед ▶</button>
                </div>
            </div>
            <div class="table-container">
                <table>
                    <thead id="tableHead"></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>

        <div class="settings-panel">
            <h2>⚙️ Настройки</h2>
            
            <div class="control-group">
                <label>🎭 Выберите шаблон сертификата</label>
                <div class="btn-group">
                    <button id="btn-template-participant" class="active" onclick="setTemplate('participant')">📜 Сертификат участника</button>
                    <button id="btn-template-thanks" onclick="setTemplate('thanks')">🙏 Благодарность</button>
                </div>
            </div>

            <div class="control-group">
                <label>Выравнивание текста:</label>
                <div class="btn-group">
                    <button id="btn-left" onclick="setAlign('left')">← Слева</button>
                    <button id="btn-center" class="active" onclick="setAlign('center')">↔ Центр</button>
                    <button id="btn-right" onclick="setAlign('right')">→ Справа</button>
                </div>
            </div>

            <div class="control-group">
                <label>Размер (мм):</label>
                <select id="sizeSelect" onchange="updateSizeSettings()">
                    <option value="a4-l">A4 Альбомный (297 × 210)</option>
                    <option value="a4-p">A4 Книжный (210 × 297)</option>
                    <option value="custom">Свой размер...</option>
                </select>
                <div id="customSizeDiv" style="display:none; gap:10px; margin-top:8px;">
                    <input type="number" id="customW" placeholder="Ширина" value="400" style="width:45%;">
                    <input type="number" id="customH" placeholder="Высота" value="200" style="width:45%;">
                </div>
            </div>

            <div class="control-group">
                <label>Фон сертификата:</label>
                <div class="bg-option-group">
                    <label><input type="radio" name="bgType" value="none" checked onchange="toggleBgInput()"> ❌ Нет</label>
                    <label><input type="radio" name="bgType" value="file" onchange="toggleBgInput()"> 🖼️ Файл</label>
                    <label><input type="radio" name="bgType" value="url" onchange="toggleBgInput()"> 🔗 Ссылка</label>
                </div>
                <input type="file" id="bgFileInput" class="hidden-input" accept="image/*" onchange="handleBgFile(this)">
                <input type="text" id="bgUrlInput" class="hidden-input" placeholder="https://example.com/image.jpg" onchange="handleBgUrl(this.value)">
                <button class="danger-btn" style="width:100%; margin-top:8px;" onclick="clearBg()">❌ Сбросить фон</button>
            </div>

            <div class="control-group color-picker-group">
                <label>🎨 Цвета текста:</label>
                <div class="color-row">
                    <label>Заголовок / шапка:</label>
                    <input type="color" id="titleColor" value="#2c3e50">
                    <span id="titleColorVal">#2c3e50</span>
                    <button class="reset-color-btn" onclick="resetColor('title')">↺</button>
                </div>
                <div class="color-row">
                    <label>Имя / ФИО:</label>
                    <input type="color" id="nameColor" value="#2980b9">
                    <span id="nameColorVal">#2980b9</span>
                    <button class="reset-color-btn" onclick="resetColor('name')">↺</button>
                </div>
                <div class="color-row">
                    <label>Основной текст:</label>
                    <input type="color" id="bodyColor" value="#555555">
                    <span id="bodyColorVal">#555555</span>
                    <button class="reset-color-btn" onclick="resetColor('body')">↺</button>
                </div>
                <div class="color-row">
                    <label>Подпись / дата:</label>
                    <input type="color" id="footerColor" value="#777777">
                    <span id="footerColorVal">#777777</span>
                    <button class="reset-color-btn" onclick="resetColor('footer')">↺</button>
                </div>
                <div class="label-hint">✨ Цвета меняются в реальном времени</div>
            </div>

            <div class="control-group">
                <label>Формат сохранения:</label>
                <select id="exportFormat">
                    <option value="pdf">📄 PDF Документ</option>
                    <option value="jpg">🖼️ JPG Изображение</option>
                    <option value="png">🖼️ PNG Изображение</option>
                </select>
            </div>

            <button id="generateCertBtn" class="main-btn" onclick="generateCertificates()" disabled>📥 Скачать сертификаты</button>
            <div id="hintText" class="hint">Загрузите Excel или заполните таблицу</div>
        </div>

        <div class="preview-area">
            <h2>👁️ Предпросмотр (активный шаблон)</h2>
            <div id="certificatePreview" class="cert-wrapper"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
